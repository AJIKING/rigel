<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="78%">
      <stop offset="0" stop-color="#14976e"/>
      <stop offset="55%" stop-color="#0b6249"/>
      <stop offset="100%" stop-color="#063a2b"/>
    </radialGradient>
    <radialGradient id="vig" cx="50%" cy="46%" r="72%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.30"/>
    </radialGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf7"/>
      <stop offset="55%" stop-color="#f2e9d3"/>
      <stop offset="100%" stop-color="#e3d6b8"/>
    </linearGradient>
    <linearGradient id="hl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="42%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="star" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffb35f"/>
      <stop offset="100%" stop-color="#ff852f"/>
    </linearGradient>
    <clipPath id="tileclip"><rect x="144" y="112" width="224" height="288" rx="24"/></clipPath>
  </defs>

  <!-- felt background (full bleed for maskable) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#vig)"/>

  <!-- tile shadow -->
  <rect x="144" y="120" width="224" height="288" rx="24" fill="#04241a" opacity="0.45"/>
  <!-- tile -->
  <rect x="144" y="112" width="224" height="288" rx="24" fill="url(#tile)" stroke="#d3c39f" stroke-width="1.5"/>
  <!-- tile top highlight + bottom inner shade -->
  <g clip-path="url(#tileclip)">
    <rect x="144" y="112" width="224" height="150" fill="url(#hl)"/>
    <rect x="144" y="372" width="224" height="28" fill="#0a0a0a" opacity="0.10"/>
  </g>

  <!-- star (Rigel) -->
  <g transform="translate(256 258)">
    <!-- soft warm shadow -->
    <g transform="translate(0 5)" opacity="0.22">
      <path transform="scale(7.9) translate(-12 -11.1)" d="M12 1.6l2.7 6.9 7.4.4-5.8 4.6 2 7.1L12 16.9 5.7 20.6l2-7.1L1.9 8.9l7.4-.4z" fill="#7a3d0e"/>
    </g>
    <path transform="scale(7.9) translate(-12 -11.1)" d="M12 1.6l2.7 6.9 7.4.4-5.8 4.6 2 7.1L12 16.9 5.7 20.6l2-7.1L1.9 8.9l7.4-.4z" fill="url(#star)"/>
  </g>
</svg>
