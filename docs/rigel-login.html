<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RIGEL — ログイン</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0f1115;
        --chrome-2: #1d2027;
        --line: #2a2e37;
        --line-2: #343943;
        --white: #f5f6f7;
        --w70: rgba(245, 246, 247, 0.66);
        --w45: rgba(245, 246, 247, 0.42);
        --em: #0c7a57;
        --em-deep: #0a5f44;
        --bone: #f5eee0;
        --accent: #ff9e45;
        --accent-2: #ff7d33;
        --round: "M PLUS Rounded 1c", sans-serif;
        --ease: cubic-bezier(0.2, 0.7, 0.2, 1);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        background: var(--bg);
        color: var(--white);
        font-family: "Noto Sans JP", sans-serif;
        -webkit-font-smoothing: antialiased;
        min-height: 100%;
        display: flex;
        flex-direction: column;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(680px 360px at 50% -6%, rgba(255, 158, 69, 0.16), transparent 70%),
          radial-gradient(560px 420px at 88% 108%, rgba(12, 122, 87, 0.18), transparent 70%);
      }
      a {
        color: var(--w70);
        text-decoration: none;
      }
      a:hover {
        color: var(--white);
      }
      :focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
        border-radius: 6px;
      }

      .login {
        position: relative;
        z-index: 1;
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px 24px;
        gap: 0;
      }
      .inner {
        width: 100%;
        max-width: 360px;
        display: flex;
        flex-direction: column;
        align-items: center;
        animation: rise 0.5s var(--ease) both;
      }
      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      /* signature table chip */
      .chip {
        width: 88px;
        height: 88px;
        border-radius: 16px;
        position: relative;
        margin-bottom: 26px;
        background: radial-gradient(circle at 50% 44%, var(--em) 0%, var(--em-deep) 100%);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.08),
          inset 0 -12px 22px rgba(0, 0, 0, 0.3),
          0 18px 40px -16px rgba(12, 122, 87, 0.6);
      }
      .chip i {
        position: absolute;
        background: var(--bone);
        border-radius: 2px;
        box-shadow: 0 1px 1px rgba(0, 0, 0, 0.35);
      }
      .chip i.h {
        width: 18px;
        height: 10px;
        left: 50%;
        margin-left: -9px;
      }
      .chip i.v {
        width: 10px;
        height: 18px;
        top: 50%;
        margin-top: -9px;
      }
      .chip i.tt {
        top: 13px;
      }
      .chip i.bb {
        bottom: 13px;
      }
      .chip i.ll {
        left: 13px;
      }
      .chip i.rr {
        right: 13px;
      }
      .chip i.dot {
        width: 8px;
        height: 11px;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        background: var(--accent);
        box-shadow: none;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 11px;
        margin-bottom: 34px;
      }
      .brand svg {
        width: 24px;
        height: 24px;
      }
      .brand .wm {
        font-family: var(--round);
        font-weight: 800;
        font-size: 30px;
        letter-spacing: 0.22em;
        padding-left: 0.22em;
      }
      .tagline {
        margin: 0 0 36px;
        font-size: 14px;
        color: var(--w70);
        line-height: 1.7;
      }

      .gbtn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        width: 100%;
        background: #fff;
        color: #1f1f1f;
        border: 0;
        border-radius: 8px;
        font-family: var(--round);
        font-weight: 700;
        font-size: 15px;
        padding: 14px 18px;
        cursor: pointer;
        box-shadow: 0 8px 24px -10px rgba(0, 0, 0, 0.6);
        transition:
          transform 0.15s var(--ease),
          box-shadow 0.15s,
          background 0.15s;
      }
      .gbtn:hover {
        background: #f3f3f3;
        transform: translateY(-1px);
        box-shadow: 0 12px 28px -10px rgba(0, 0, 0, 0.65);
      }
      .gbtn:active {
        transform: none;
      }
      .gbtn:disabled {
        cursor: default;
        opacity: 0.85;
        transform: none;
      }
      .gbtn .g {
        width: 19px;
        height: 19px;
        flex: 0 0 auto;
      }
      .gspin {
        width: 18px;
        height: 18px;
        border: 2.5px solid rgba(0, 0, 0, 0.22);
        border-top-color: #1f1f1f;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .legal {
        margin: 22px 2px 0;
        font-size: 11.5px;
        color: var(--w45);
        line-height: 1.8;
        max-width: 320px;
      }
      .legal a {
        color: var(--w70);
        text-decoration: underline;
        text-underline-offset: 2px;
      }

      .foot {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 20px;
        font-size: 11px;
        color: var(--w45);
        letter-spacing: 0.04em;
      }

      @media (prefers-reduced-motion: reduce) {
        .inner {
          animation: none;
        }
        .gspin {
          animation-duration: 0.001s;
        }
      }
    </style>
  </head>
  <body>
    <main class="login">
      <div class="inner">
        <div class="chip" aria-hidden="true">
          <i class="h tt"></i><i class="h bb"></i><i class="v ll"></i><i class="v rr"></i
          ><i class="dot"></i>
        </div>
        <div class="brand">
          <svg viewBox="0 0 24 24" fill="none">
            <path
              d="M12 1.6l2.7 6.9 7.4.4-5.8 4.6 2 7.1L12 16.9 5.7 20.6l2-7.1L1.9 8.9l7.4-.4z"
              fill="#ff9e45"
            />
          </svg>
          <span class="wm">RIGEL</span>
        </div>

        <button class="gbtn" id="gbtn">
          <svg class="g" viewBox="0 0 48 48" aria-hidden="true">
            <path
              fill="#EA4335"
              d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"
            />
            <path
              fill="#4285F4"
              d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"
            />
            <path
              fill="#FBBC05"
              d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"
            />
            <path
              fill="#34A853"
              d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"
            />
          </svg>
          <span id="gtxt">Google でログイン</span>
        </button>

        <p class="legal">
          続行すると、<a href="#">利用規約</a> と
          <a href="#">プライバシーポリシー</a> に同意したものとみなされます。
        </p>
      </div>
    </main>
    <div class="foot">© 2026 RIGEL</div>

    <script>
      const btn = document.getElementById("gbtn"),
        txt = document.getElementById("gtxt");
      const gLogo = btn.querySelector(".g");
      btn.addEventListener("click", () => {
        if (btn.disabled) return;
        btn.disabled = true;
        gLogo.style.display = "none";
        txt.outerHTML = '<span class="gspin" id="gtxt"></span>';
        // mock: ここで Google OAuth フローを開始
        setTimeout(() => {
          const s = document.getElementById("gtxt");
          // 実装では認証後にアプリへ遷移。プロトタイプでは元に戻す。
          s.outerHTML = '<span id="gtxt">Google でログイン</span>';
          gLogo.style.display = "";
          btn.disabled = false;
        }, 1600);
      });
    </script>
  </body>
</html>
