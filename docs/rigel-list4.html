<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RIGEL — 牌譜一覧</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0f1115;
        --chrome: #16181d;
        --chrome-2: #1d2027;
        --chrome-3: #23262e;
        --line: #2a2e37;
        --line-2: #343943;
        --white: #f5f6f7;
        --w85: rgba(245, 246, 247, 0.86);
        --w70: rgba(245, 246, 247, 0.66);
        --w45: rgba(245, 246, 247, 0.42);
        --em: #0c7a57;
        --em-deep: #0a5f44;
        --em-light: #3ec487;
        --orange: #ff9e45;
        --vermilion: #e24b3a;
        --bone: #f5eee0;
        --accent: #ff9e45;
        --accent-2: #ff7d33;
        --r: 6px;
        --r-sm: 3px;
        --round: "M PLUS Rounded 1c", sans-serif;
        --ease: cubic-bezier(0.2, 0.7, 0.2, 1);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
      }
      body {
        background: var(--bg);
        color: var(--white);
        font-family: "Noto Sans JP", sans-serif;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background: radial-gradient(
          900px 380px at 78% -8%,
          rgba(12, 122, 87, 0.2),
          transparent 70%
        );
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      button {
        font-family: inherit;
      }
      :focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
        border-radius: var(--r-sm);
      }

      /* ---------- header ---------- */
      header {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 12px 20px;
        background: rgba(22, 24, 29, 0.86);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--line);
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: var(--round);
        font-weight: 800;
        letter-spacing: 0.14em;
        font-size: 16px;
      }
      .brand svg {
        width: 17px;
        height: 17px;
      }
      .topnav {
        display: flex;
        gap: 2px;
        margin-left: 6px;
      }
      .topnav button {
        background: transparent;
        border: 0;
        color: var(--w45);
        font-family: var(--round);
        font-weight: 700;
        font-size: 13.5px;
        padding: 8px 12px;
        cursor: pointer;
        position: relative;
        transition: color 0.15s;
      }
      .topnav button:hover {
        color: var(--w85);
      }
      .topnav button.on {
        color: var(--white);
      }
      .topnav button.on::after {
        content: "";
        position: absolute;
        left: 12px;
        right: 12px;
        bottom: 2px;
        height: 2px;
        background: var(--accent);
        border-radius: 1px;
      }
      .spacer {
        flex: 1;
      }
      .avatar {
        flex: 0 0 auto;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        font-family: var(--round);
        font-weight: 800;
        font-size: 13px;
        color: #0c0e12;
      }

      /* ---------- shell ---------- */
      main {
        position: relative;
        z-index: 1;
        max-width: 1000px;
        margin: 0 auto;
        padding: 0 20px 96px;
      }
      .view {
        display: none;
        animation: fade 0.35s var(--ease);
      }
      .view.on {
        display: block;
      }
      @keyframes fade {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      /* ---------- profile (mine) ---------- */
      .profile {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 28px 4px 22px;
      }
      .profile .pa {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        font-family: var(--round);
        font-weight: 800;
        font-size: 24px;
        color: #0c0e12;
        flex: 0 0 auto;
      }
      .profile .pinfo {
        min-width: 0;
      }
      .profile .pname {
        font-family: var(--round);
        font-weight: 800;
        font-size: 21px;
        line-height: 1.1;
        display: flex;
        align-items: center;
        gap: 9px;
        flex-wrap: wrap;
      }
      .plan {
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.04em;
        padding: 2px 8px;
        border-radius: 99px;
        color: #0c0e12;
        background: linear-gradient(100deg, var(--accent), var(--accent-2));
      }
      .stats {
        display: flex;
        gap: 20px;
        margin-top: 10px;
      }
      .stat {
        display: flex;
        flex-direction: column;
        gap: 1px;
      }
      .stat b {
        font-family: var(--round);
        font-weight: 800;
        font-size: 17px;
      }
      .stat span {
        font-size: 11px;
        color: var(--w45);
      }

      /* ---------- public head ---------- */
      .pubhead {
        padding: 26px 4px 16px;
      }
      .pubhead h1 {
        font-family: var(--round);
        font-weight: 800;
        font-size: 23px;
        margin: 0 0 3px;
      }
      .pubhead p {
        margin: 0;
        font-size: 12.5px;
        color: var(--w45);
      }

      /* ---------- toolbar ---------- */
      .toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        padding: 6px 4px 16px;
      }
      .tabs {
        display: flex;
        gap: 4px;
      }
      .tabs button,
      .chip {
        background: var(--chrome-2);
        border: 1px solid var(--line);
        color: var(--w70);
        font-family: var(--round);
        font-weight: 700;
        font-size: 12px;
        padding: 6px 12px;
        border-radius: var(--r-sm);
        cursor: pointer;
        transition: 0.15s;
        white-space: nowrap;
      }
      .tabs button:hover,
      .chip:hover {
        color: var(--w85);
        border-color: var(--line-2);
      }
      .tabs button.on,
      .chip.on {
        background: var(--accent);
        border-color: var(--accent);
        color: #0c0e12;
      }
      .search {
        position: relative;
        flex: 1;
        min-width: 140px;
      }
      .search input {
        width: 100%;
        background: var(--chrome-2);
        border: 1px solid var(--line);
        color: var(--white);
        font-family: inherit;
        font-size: 13px;
        padding: 8px 12px 8px 32px;
        border-radius: var(--r-sm);
      }
      .search input::placeholder {
        color: var(--w45);
      }
      .search svg {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        width: 14px;
        height: 14px;
        stroke: var(--w45);
        fill: none;
        stroke-width: 2;
      }
      .newbtn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--white);
        color: #0c0e12;
        border: 0;
        font-family: var(--round);
        font-weight: 800;
        font-size: 12.5px;
        padding: 8px 14px;
        border-radius: var(--r-sm);
        cursor: pointer;
        transition: 0.15s;
      }
      .newbtn:hover {
        background: #e6e7e9;
      }
      .sortwrap {
        position: relative;
      }
      .sortwrap select {
        appearance: none;
        -webkit-appearance: none;
        background: var(--chrome-2);
        border: 1px solid var(--line);
        color: var(--w85);
        font-family: var(--round);
        font-weight: 700;
        font-size: 12px;
        padding: 7px 26px 7px 11px;
        border-radius: var(--r-sm);
        cursor: pointer;
      }
      .sortwrap::after {
        content: "";
        position: absolute;
        right: 11px;
        top: 50%;
        width: 6px;
        height: 6px;
        border-right: 1.5px solid var(--w70);
        border-bottom: 1.5px solid var(--w70);
        transform: translateY(-70%) rotate(45deg);
        pointer-events: none;
      }

      /* ---------- feed + cards ---------- */
      .feed {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(232px, 1fr));
        gap: 12px;
      }
      .card {
        display: flex;
        flex-direction: column;
        padding: 14px;
        position: relative;
        background: var(--chrome);
        border: 1px solid var(--line);
        border-radius: var(--r);
        cursor: pointer;
        transition:
          transform 0.18s var(--ease),
          border-color 0.18s,
          background 0.18s;
        opacity: 0;
        transform: translateY(10px);
        animation: rise 0.4s var(--ease) forwards;
      }
      .fav {
        position: absolute;
        top: 9px;
        right: 9px;
        z-index: 2;
        width: 30px;
        height: 30px;
        border-radius: var(--r-sm);
        display: grid;
        place-items: center;
        cursor: pointer;
        border: 0;
        color: var(--white);
        background: rgba(15, 17, 21, 0.5);
        backdrop-filter: blur(4px);
        transition: 0.15s;
      }
      .fav:hover {
        background: rgba(15, 17, 21, 0.82);
      }
      .fav svg {
        width: 16px;
        height: 16px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.8;
        transition: 0.15s;
      }
      .fav.on {
        color: var(--accent);
      }
      .fav.on svg {
        fill: var(--accent);
        stroke: var(--accent);
      }
      @keyframes rise {
        to {
          opacity: 1;
          transform: none;
        }
      }
      .card:hover {
        transform: translateY(-2px);
        border-color: var(--line-2);
        background: #181b21;
      }

      /* table-chip thumbnail — the signature element */
      .thumb {
        width: 100%;
        height: 82px;
        border-radius: var(--r);
        position: relative;
        margin-bottom: 12px;
        background: radial-gradient(circle at 50% 46%, var(--em) 0%, var(--em-deep) 100%);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.07),
          inset 0 -10px 18px rgba(0, 0, 0, 0.28);
        overflow: hidden;
      }
      .thumb i {
        position: absolute;
        background: var(--bone);
        border-radius: 1px;
        box-shadow: 0 1px 1px rgba(0, 0, 0, 0.35);
      }
      .thumb i.h {
        width: 13px;
        height: 7px;
        left: 50%;
        margin-left: -6.5px;
      }
      .thumb i.v {
        width: 7px;
        height: 13px;
        top: 50%;
        margin-top: -6.5px;
      }
      .thumb i.tt {
        top: 9px;
      }
      .thumb i.bb {
        bottom: 9px;
      }
      .thumb i.ll {
        left: 9px;
      }
      .thumb i.rr {
        right: 9px;
      }
      .thumb i.dot {
        width: 6px;
        height: 8px;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        background: var(--orange);
        box-shadow: none;
      }

      .cmain {
        flex: 1;
        min-width: 0;
      }
      .ctop {
        display: flex;
        align-items: flex-start;
        gap: 8px;
      }
      .ctitle {
        font-family: var(--round);
        font-weight: 700;
        font-size: 14.5px;
        line-height: 1.35;
        flex: 1;
        min-width: 0;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .badge {
        flex: 0 0 auto;
        font-size: 10px;
        font-weight: 700;
        padding: 2px 7px;
        border-radius: 99px;
        margin-top: 1px;
      }
      .badge.pub {
        color: #0c0e12;
        background: var(--accent);
      }
      .badge.priv {
        color: var(--w70);
        background: var(--chrome-3);
        border: 1px solid var(--line-2);
      }
      .cmeta {
        display: flex;
        align-items: center;
        gap: 7px;
        margin-top: 4px;
        font-size: 11.5px;
        color: var(--w45);
      }
      .cmeta .au {
        color: var(--w70);
      }
      .cmeta .sep {
        opacity: 0.5;
      }
      .players {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 11px;
      }
      .pchip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: var(--w70);
        background: var(--chrome-2);
        border: 1px solid var(--line);
        border-radius: var(--r-sm);
        padding: 3px 8px;
      }
      .pchip .pn {
        color: var(--w85);
        max-width: 74px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .pchip.me .pn {
        color: var(--em-light);
        font-weight: 700;
      }
      .pchip .pp {
        font-family: var(--round);
        font-weight: 700;
      }
      .pchip .pp.pos {
        color: var(--em-light);
      }
      .pchip .pp.neg {
        color: var(--vermilion);
      }
      .pchip.win {
        border-color: rgba(255, 158, 69, 0.5);
      }
      .pchip.win::before {
        content: "";
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--orange);
        flex: 0 0 auto;
      }
      .cfoot {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-top: 11px;
        font-size: 11px;
        color: var(--w45);
      }
      .cfoot span {
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .cfoot svg {
        width: 13px;
        height: 13px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.8;
      }

      .empty {
        text-align: center;
        color: var(--w45);
        font-size: 13px;
        padding: 48px 0;
      }

      @media (max-width: 520px) {
        header {
          gap: 10px;
          padding: 11px 14px;
        }
        main {
          padding: 0 14px 96px;
        }
        .topnav button {
          padding: 8px 8px;
          font-size: 12.5px;
        }
        .brand span {
          display: none;
        }
        .profile .pname {
          font-size: 19px;
        }
        .thumb {
          width: 54px;
          height: 54px;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        * {
          animation: none !important;
          transition: none !important;
        }
        .card {
          opacity: 1;
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">
        <svg viewBox="0 0 24 24" fill="none">
          <path
            d="M12 1.6l2.7 6.9 7.4.4-5.8 4.6 2 7.1L12 16.9 5.7 20.6l2-7.1L1.9 8.9l7.4-.4z"
            fill="#ff9e45"
          />
        </svg>
        <span>RIGEL</span>
      </div>
      <nav class="topnav">
        <button data-view="mine" class="on">マイページ</button>
        <button data-view="public">公開牌譜</button>
      </nav>
      <div class="spacer"></div>
      <div class="avatar" style="background: linear-gradient(135deg, #ffb35c, #ff7d33)">あ</div>
    </header>

    <main>
      <!-- ===== マイページ ===== -->
      <section class="view on" id="view-mine">
        <div class="profile">
          <div class="pinfo">
            <div class="stats">
              <div class="stat"><b>24</b><span>牌譜</span></div>
              <div class="stat"><b>9</b><span>公開</span></div>
              <div class="stat"><b>187</b><span>記録した局</span></div>
            </div>
          </div>
        </div>

        <div class="toolbar">
          <div class="search">
            <svg viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="7" />
              <path d="M21 21l-4-4" />
            </svg>
            <input
              id="mineSearch"
              type="search"
              placeholder="牌譜を検索"
              aria-label="自分の牌譜を検索"
            />
          </div>
          <div class="sortwrap">
            <select id="mineStatus" aria-label="公開状態で絞り込み">
              <option value="all">すべて</option>
              <option value="pub">公開</option>
              <option value="priv">非公開</option>
              <option value="fav">お気に入り</option>
            </select>
          </div>
          <div class="sortwrap">
            <select id="mineSort" aria-label="並び替え">
              <option value="new">新しい順</option>
              <option value="old">古い順</option>
              <option value="kyoku">局数が多い順</option>
            </select>
          </div>
          <button class="newbtn" id="newBtn">
            <svg
              viewBox="0 0 24 24"
              width="14"
              height="14"
              fill="none"
              stroke="currentColor"
              stroke-width="2.4"
            >
              <path d="M12 5v14M5 12h14" /></svg
            >新規
          </button>
        </div>

        <div class="feed" id="mineFeed"></div>
      </section>

      <!-- ===== 公開牌譜 ===== -->
      <section class="view" id="view-public">
        <div class="pubhead">
          <h1>公開牌譜</h1>
          <p>みんなが共有した卓の記録を見る</p>
        </div>
        <div class="toolbar">
          <div class="search">
            <svg viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="7" />
              <path d="M21 21l-4-4" />
            </svg>
            <input
              id="pubSearch"
              type="search"
              placeholder="タイトル・投稿者で検索"
              aria-label="公開牌譜を検索"
            />
          </div>
          <div class="sortwrap">
            <select id="pubSort" aria-label="並び替え">
              <option value="new">新着</option>
              <option value="pop">人気</option>
              <option value="week">今週</option>
            </select>
          </div>
        </div>
        <div class="feed" id="pubFeed"></div>
      </section>
    </main>

    <script>
      const COLORS = [
        "#3ec487,#0c7a57",
        "#ffb35c,#ff7a45",
        "#6ea8ff,#3d6fd6",
        "#c08bff,#8a5cf0",
        "#ff7e9d,#e24b6f",
        "#5fd6c4,#1f9e8c",
      ];
      function ava(name, i) {
        const c = COLORS[i % COLORS.length];
        return `<span class="pa-mini">${name[0]}</span>`;
      }
      function fmtPts(p) {
        if (p > 0) return "+" + p.toFixed(1);
        if (p < 0) return p.toFixed(1);
        return "±0";
      }
      function ptsClass(p) {
        return p > 0 ? "pos" : p < 0 ? "neg" : "";
      }

      // thumbnail: emerald table with 4 tiles + dora dot
      const THUMB =
        '<div class="thumb"><i class="h tt"></i><i class="h bb"></i><i class="v ll"></i><i class="v rr"></i><i class="dot"></i></div>';

      function playersHTML(ps) {
        return (
          '<div class="players">' +
          ps
            .map(
              (p) =>
                `<span class="pchip${p.me ? " me" : ""}${p.win ? " win" : ""}"><span class="pn">${p.n}</span><span class="pp ${ptsClass(p.p)}">${fmtPts(p.p)}</span></span>`,
            )
            .join("") +
          "</div>"
        );
      }

      // ----- sample data -----
      const MINE = [
        {
          title: "金曜の友人宅セット卓",
          date: "2026-06-27",
          kyoku: 8,
          rule: "半荘",
          pub: true,
          players: [
            { n: "あなた", p: 48.2, me: 1, win: 1 },
            { n: "川島", p: -12.0 },
            { n: "佐藤", p: -18.5 },
            { n: "田中", p: -17.7 },
          ],
        },
        {
          title: "雀荘リーグ 第3節",
          date: "2026-06-21",
          kyoku: 7,
          rule: "半荘",
          pub: false,
          players: [
            { n: "あなた", p: -9.4, me: 1 },
            { n: "川島", p: 31.6, win: 1 },
            { n: "佐藤", p: -4.2 },
            { n: "田中", p: -18.0 },
          ],
        },
        {
          title: "昼休みの東風戦",
          date: "2026-06-18",
          kyoku: 4,
          rule: "東風",
          pub: true,
          players: [
            { n: "あなた", p: 22.1, me: 1, win: 1 },
            { n: "川島", p: -2.0 },
            { n: "佐藤", p: -8.6 },
            { n: "田中", p: -11.5 },
          ],
        },
        {
          title: "部内大会 予選A卓",
          date: "2026-06-12",
          kyoku: 9,
          rule: "半荘",
          pub: true,
          players: [
            { n: "あなた", p: 5.8, me: 1 },
            { n: "山口", p: 14.0, win: 1 },
            { n: "佐藤", p: -2.3 },
            { n: "田中", p: -17.5 },
          ],
        },
        {
          title: "雨の日の練習卓",
          date: "2026-06-05",
          kyoku: 6,
          rule: "半荘",
          pub: false,
          players: [

      MINE.forEach((d, i) => {
        d.id = "m" + (i + 1);
        d.src = "mine";
      });
      PUBLIC.forEach((d, i) => {
        d.id = "p" + (i + 1);
        d.src = "public";
      });
      const ALL = [...MINE, ...PUBLIC];
      let favs = new Set(["m1", "p2", "p5"]);

      function card(d) {
        const isPub = d.src === "public";
        const meta = isPub
          ? `<span class="au">@${d.author}</span><span class="sep">·</span>${d.date}<span class="sep">·</span>${d.kyoku}局`
          : `${d.date}<span class="sep">·</span>${d.rule}<span class="sep">·</span>${d.kyoku}局`;
        const badge = isPub
          ? ""
          : d.pub
            ? '<span class="badge pub">公開</span>'
            : '<span class="badge priv">非公開</span>';
        const foot = isPub
          ? `<div class="cfoot"><span><svg viewBox="0 0 24 24"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>${d.views}</span><span><svg viewBox="0 0 24 24"><path d="M20.8 5.6a5 5 0 0 0-7.1 0L12 7.3l-1.7-1.7a5 5 0 1 0-7.1 7.1L12 21.5l8.8-8.8a5 5 0 0 0 0-7.1z"/></svg>${d.likes}</span></div>`
          : "";
        const faved = favs.has(d.id);
        const fav = `<button class="fav${faved ? " on" : ""}" data-id="${d.id}" aria-pressed="${faved}" aria-label="お気に入り"><svg viewBox="0 0 24 24"><path d="M12 2.6l2.85 6.02 6.6.62-4.97 4.4 1.46 6.46L12 17.7 6.06 20.7l1.46-6.46-4.97-4.4 6.6-.62z"/></svg></button>`;
        return `<article class="card" tabindex="0">${fav}${THUMB}
    <div class="ctop"><h3 class="ctitle">${d.title}</h3>${badge}</div>
    <div class="cmeta">${meta}</div>
    ${foot}</article>`;
      }

      function stagger(feed) {
        [...feed.querySelectorAll(".card")].forEach(
          (c, i) => (c.style.animationDelay = (i * 0.045).toFixed(3) + "s"),
        );
      }

      // ---- mine render ----
      let mineTab = "all",
        mineSort = "new",
        mineQ = "";
      function renderMine() {
        let arr;
        if (mineTab === "fav") arr = ALL.filter((d) => favs.has(d.id));
        else arr = MINE.filter((d) => mineTab === "all" || (mineTab === "pub" ? d.pub : !d.pub));
        if (mineQ)
          arr = arr.filter(
            (d) => d.title.includes(mineQ) || (d.author && d.author.includes(mineQ)),
          );
        arr = arr.slice().sort((a, b) => {
          if (mineSort === "kyoku") return b.kyoku - a.kyoku;
          return mineSort === "old" ? a.date.localeCompare(b.date) : b.date.localeCompare(a.date);
        });
        const f = document.getElementById("mineFeed");
        const emptyMsg =
          mineTab === "fav" ? "お気に入りした牌譜はまだありません" : "該当する牌譜がありません";
        f.innerHTML = arr.length ? arr.map(card).join("") : `<div class="empty">${emptyMsg}</div>`;
        stagger(f);
      }
      // ---- public render ----
      let pubSort = "new",
        pubQ = "";
      function renderPublic() {
        let arr = PUBLIC.slice();
        if (pubQ) arr = arr.filter((d) => d.title.includes(pubQ) || d.author.includes(pubQ));
        arr.sort((a, b) => {
          if (pubSort === "pop") return b.likes - a.likes;
          if (pubSort === "week") return b.pop - a.pop;
          return b.date.localeCompare(a.date);
        });
        const f = document.getElementById("pubFeed");
        f.innerHTML = arr.length
          ? arr.map(card).join("")
          : '<div class="empty">該当する牌譜がありません</div>';
        stagger(f);
      }

      // ---- nav ----
      document.querySelector(".topnav").addEventListener("click", (e) => {
        const b = e.target.closest("[data-view]");
        if (!b) return;
        document
          .querySelectorAll(".topnav button")
          .forEach((x) => x.classList.toggle("on", x === b));
        const v = b.dataset.view;
        document.getElementById("view-mine").classList.toggle("on", v === "mine");
        document.getElementById("view-public").classList.toggle("on", v === "public");
        (v === "mine" ? renderMine : renderPublic)();
        window.scrollTo({ top: 0 });
      });

      // ---- mine controls ----
      document.getElementById("mineStatus").addEventListener("change", (e) => {
        mineTab = e.target.value;
        renderMine();
      });
      document.getElementById("mineSort").addEventListener("change", (e) => {
        mineSort = e.target.value;
        renderMine();
      });
      document.getElementById("mineSearch").addEventListener("input", (e) => {
        mineQ = e.target.value.trim();
        renderMine();
      });
      document.getElementById("newBtn").addEventListener("click", () => {
        /* would open the photo→AI / 手動 flow */
      });

      // ---- public controls ----
      document.getElementById("pubSort").addEventListener("change", (e) => {
        pubSort = e.target.value;
        renderPublic();
      });
      document.getElementById("pubSearch").addEventListener("input", (e) => {
        pubQ = e.target.value.trim();
        renderPublic();
      });

      // ---- favorites ----
      function toggleFav(id) {
        if (favs.has(id)) favs.delete(id);
        else favs.add(id);
        const on = favs.has(id);
        document.querySelectorAll('.fav[data-id="' + id + '"]').forEach((b) => {
          b.classList.toggle("on", on);
          b.setAttribute("aria-pressed", on);
        });
        if (
          !on &&
          mineTab === "fav" &&
          document.getElementById("view-mine").classList.contains("on")
        )
          renderMine();
      }
      document.querySelectorAll(".feed").forEach((f) =>
        f.addEventListener("click", (e) => {
          const b = e.target.closest(".fav");
          if (!b) return;
          e.stopPropagation();
          toggleFav(b.dataset.id);
        }),
      );

      renderMine();
      renderPublic();
    </script>
  </body>
