# Codemagic（iOS の TestFlight 配布用）。
# テスト/型チェックの正典は GitHub Actions（ci.yml）で、Codemagic は
# 「Mac がなくても IPA をビルドして TestFlight へ上げる」ためだけに使う。
# 参考: mobiles/piano の codemagic.yaml（Flutter）を、Expo(React Native)・
# pnpm/turborepo モノレポ（モバイルは apps/mobile）へ移植したもの。
#
# 事前に Codemagic の UI 側で必要な設定:
# 1. Team settings → Integrations → App Store Connect で API キー
#    （App Store Connect → ユーザとアクセス → 統合 で発行した Issuer ID / Key ID / .p8）
#    を登録し、名前を `app_store_connect_key` にする（下の integrations が参照）。
# 2. 環境変数グループ `appstore_credentials` に CERTIFICATE_PRIVATE_KEY
#    （配布証明書用の RSA 秘密鍵。Secure で登録）を入れる。
# 3. 環境変数グループ `rigel_mobile_env` に、ビルド時にバンドルへ焼き込む公開値:
#       EXPO_PUBLIC_API_URL          … 本番 API のベースURL（Workers のデプロイ先）
#       EXPO_PUBLIC_GOOGLE_CLIENT_ID … Google OAuth Web クライアントID（id_token フロー用）
# 4. App Store Connect に App（Bundle ID: co.plaria.rigel）を登録しておく
#    （app.json の ios.bundleIdentifier と一致させる）。
# 5. アプリ設定で「Switch to codemagic.yaml configuration」を選ぶ。
#
# トリガーは設定しない = 手動起動のみ（Start new build → ios-testflight）。
#
# ⚠️ pnpm モノレポ × Expo prebuild の注意:
#   ネイティブ依存の解決（CocoaPods / autolinking）が pnpm のシンボリックリンクで
#   失敗する場合は、リポジトリ直下に `.npmrc` を作り `node-linker=hoisted` を指定して
#   フラットな node_modules にすると解決する（その場合は他ワークスペースの
#   ビルドも一度確認すること）。

workflows:
  ios-testflight:
    name: iOS TestFlight (rigel)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: app_store_connect_key
    environment:
      groups:
        - appstore_credentials # CERTIFICATE_PRIVATE_KEY
        - rigel_mobile_env # EXPO_PUBLIC_API_URL / EXPO_PUBLIC_GOOGLE_CLIENT_ID
      node: 22
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "co.plaria.rigel" # app.json の ios.bundleIdentifier と一致
        XCODE_WORKSPACE: "apps/mobile/ios/rigel.xcworkspace" # expo prebuild が生成
        XCODE_SCHEME: "rigel" # Xcode スキーム名（= アプリ名。生成後に要確認）
    scripts:
      - name: pnpm を有効化
        script: corepack enable && corepack prepare pnpm@10.13.1 --activate

      - name: 依存をインストール（モノレポ・ルート）
        script: pnpm install --frozen-lockfile

      - name: 型チェック（mobile）
        script: pnpm --filter mobile typecheck

      - name: iOS ネイティブプロジェクトを生成（expo prebuild）
        # --no-install: pod install / npm install をスキップ（pnpm で導入済み・pod は次工程）
        # --clean: ios/ を作り直してビルドの再現性を上げる
        script: |
          cd apps/mobile
          CI=1 npx expo prebuild --platform ios --no-install --clean

      - name: CocoaPods
        script: |
          cd apps/mobile/ios
          pod install

      # ios_signing の自動署名はサーバ側で失敗するとログが残らないため、CLI で明示的に取得・作成する。
      # 認証情報（APP_STORE_CONNECT_*）は上の integrations から環境変数で渡される。
      - name: 署名ファイルを取得・作成して適用
        script: |
          cd apps/mobile/ios
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE --platform IOS --create
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

      - name: ビルド番号を設定（TestFlight 重複回避）
        # BUILD_NUMBER は Codemagic のビルド連番。TestFlight はビルド番号の重複を拒否するため、
        # app.json の version ではなく Codemagic 連番を CFBundleVersion に焼く。
        script: |
          cd apps/mobile/ios
          agvtool new-version -all "$BUILD_NUMBER"

      - name: IPA をビルド
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        # アップロード後に TestFlight の内部テスターへ自動公開する。
        submit_to_testflight: true

  # ------------------------------------------------------------
  # Android（Google Play 内部テスト配布）。手動起動のみ。
  # 事前に Codemagic の UI 側で必要な設定:
  #   - 環境変数グループ `keystore_credentials`（すべて Secure 登録）:
  #       CM_KEYSTORE          … アップロード用キーストアを base64 化した文字列
  #       CM_KEYSTORE_PASSWORD … キーストアのパスワード
  #       CM_KEY_ALIAS         … 鍵エイリアス
  #       CM_KEY_PASSWORD      … 鍵のパスワード
  #   - 環境変数グループ `google_play_credentials`:
  #       GCLOUD_SERVICE_ACCOUNT_CREDENTIALS … Google Play 用サービスアカウントの JSON
  #   - Google Play Console にアプリ（co.plaria.rigel）を登録し、内部テストトラックを用意。
  # 署名は build.gradle を書き換えず AGP の injected signing で行う。
  # ------------------------------------------------------------
  android-googleplay:
    name: Android Google Play (rigel)
    instance_type: linux_x2
    max_build_duration: 60
    environment:
      groups:
        - keystore_credentials # CM_KEYSTORE / CM_KEYSTORE_PASSWORD / CM_KEY_ALIAS / CM_KEY_PASSWORD
        - google_play_credentials # GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        - rigel_mobile_env # EXPO_PUBLIC_API_URL / EXPO_PUBLIC_GOOGLE_CLIENT_ID
      node: 22
      java: 17
      vars:
        PACKAGE_NAME: "co.plaria.rigel" # app.json の android.package と一致
    scripts:
      - name: pnpm を有効化
        script: corepack enable && corepack prepare pnpm@10.13.1 --activate

      - name: 依存をインストール（モノレポ・ルート）
        script: pnpm install --frozen-lockfile

      - name: 型チェック（mobile）
        script: pnpm --filter mobile typecheck

      - name: Android ネイティブプロジェクトを生成（expo prebuild）
        script: |
          cd apps/mobile
          CI=1 npx expo prebuild --platform android --no-install --clean

      - name: キーストアを配置
        script: |
          echo "$CM_KEYSTORE" | base64 --decode > "$CM_BUILD_DIR/apps/mobile/android/app/release.keystore"

      - name: versionCode を Codemagic 連番に（Play は重複を拒否）
        script: |
          sed -i "s/versionCode [0-9]\+/versionCode $BUILD_NUMBER/" \
            apps/mobile/android/app/build.gradle

      - name: AAB をビルド（injected signing で署名）
        script: |
          cd apps/mobile/android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file="$CM_BUILD_DIR/apps/mobile/android/app/release.keystore" \
            -Pandroid.injected.signing.store.password="$CM_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$CM_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$CM_KEY_PASSWORD"
    artifacts:
      - apps/mobile/android/app/build/outputs/**/*.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        # 内部テストトラックへアップロード（公開トラックは Console から手動昇格）。
        track: internal
