# Cloudflare Workers 設定（API 本体 / Hono + Drizzle + D1）
# 実行: `pnpm --filter api dev`（wrangler dev）
# マイグレーション: `pnpm --filter api db:generate` → `db:migrate:local` / `db:migrate`

name = "rigel-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"                 # env.DB（src/env.ts）に対応
database_name = "rigel"
database_id = "REPLACE_WITH_REAL_D1_ID" # `wrangler d1 create rigel` で発行して差し替える
migrations_dir = "migrations"

[observability]
enabled = true

# Secret で渡す（コミットしない）:
#   wrangler secret put GEMINI_API_KEY
#   wrangler secret put CLOUDFLARE_AI_GATEWAY_URL   # google-ai-studio ベースURL（/v1beta の手前まで）
#   wrangler secret put SESSION_SECRET              # セッション署名鍵
#   wrangler secret put STRIPE_SECRET_KEY           # 課金（未設定なら /billing/* は 501）
#   wrangler secret put STRIPE_WEBHOOK_SECRET       # Stripe Webhook 署名シークレット（whsec_...）

[vars]
# 読み取りモデル。⚠️ AI Studio で現行の対応モデルを確認して差し替える（ハードコードしない）。
GEMINI_RIVER_MODEL = "gemini-2.5-flash"       # 河=難所
GEMINI_HAND_MODEL = "gemini-2.5-flash-lite"   # 手牌=素直なタスク
# Google OAuth クライアントID（公開値）。実値に差し替える。
GOOGLE_CLIENT_ID = "REPLACE_WITH_GOOGLE_CLIENT_ID"
# サブスクの価格ID（公開値・秘密ではない）。RIGEL Next=¥480 / RIGEL Pro=¥1480。
STRIPE_PRICE_NEXT = "price_1TnGLeLYWvIdYJVUk7f9jGUk"
STRIPE_PRICE_PRO = "price_1TnGN3LYWvIdYJVUvg6fCymx"
